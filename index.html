<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./src/assets/images/sv-favicon-64.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialVibe</title>
    <meta
      name="description"
      content="En SocialVibe Agency gestionamos tus redes sociales y te asesoramos como influencer 📲, para que consigas los mejores resultados 📈"
    />

    <!-- Preconnect para Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts carga asíncrona (no render-blocking) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&family=Source+Serif+Pro:wght@300;400;600;700;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&family=Source+Serif+Pro:wght@300;400;600;700;900&display=swap"
      />
    </noscript>

    <!-- Preload LCP image (mobile nav home icon) para descubrimiento inmediato -->
    <link rel="preload" as="image" href="/sv.webp" fetchpriority="high" type="image/webp" />

    <!-- Critical CSS: intro overlay + CSS vars (evita FOUC mientras carga el CSS async) -->
    <style>
      :root {
        --color-primario: white;
        --color-secundario: #480da0;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, -apple-system, sans-serif; }
      .intro {
        background-color: var(--color-secundario);
        height: 100vh;
        top: 0; left: 0;
        width: 100%;
        position: fixed;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        will-change: transform;
        transition: transform 0.4s ease;
      }
      .intro img {
        width: 50rem;
        max-width: 90vw;
        height: auto;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
