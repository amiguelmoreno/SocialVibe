<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./src/assets/images/sv-favicon-64.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialVibe</title>
    <meta
      name="description"
      content="En SocialVibe Agency gestionamos tus redes sociales y te asesoramos como influencer 📲, para que consigas los mejores resultados 📈"
    />

    <!-- Preconnect para Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts carga asíncrona (no render-blocking) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&family=Source+Serif+Pro:wght@300;400;600;700;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&family=Source+Serif+Pro:wght@300;400;600;700;900&display=swap"
      />
    </noscript>

    <!-- Preload LCP image (mobile nav home icon) para descubrimiento inmediato -->
    <link rel="preload" as="image" href="/sv.webp" fetchpriority="high" type="image/webp" />

    <!-- Inline font fallback para evitar FOUT visible -->
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
