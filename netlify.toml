[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long-lived cache for hashed assets (CSS, JS, images — hash changes on every build)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for entry points that may change
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache the public LCP image (stable URL, no hash)
[[headers]]
  for = "/sv.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"
